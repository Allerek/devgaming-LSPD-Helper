<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSPD - Kartoteka</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0c0e14] text-slate-200 flex h-screen overflow-hidden font-['Outfit'] select-none">
    
    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="fixed inset-0 bg-[#000040] z-[9999] flex flex-col items-center justify-center border-y-[10px] border-[#ffcc00] transition-opacity duration-1000">
        <div class="absolute top-10 right-10 text-white text-2xl font-bold tracking-[3px] opacity-80 uppercase">Los Santos Police Dept.</div>
        <div class="absolute bottom-10 left-10 text-white text-2xl font-bold opacity-60 uppercase">LSPD</div>
        
        <div class="w-[420px] bg-[#c0c0c0] border-2 border-white border-r-[#808080] border-b-[#808080] shadow-2xl p-[2px]">
            <div class="bg-gradient-to-r from-[#000080] to-[#1084d0] text-white px-2 py-1 font-bold text-xs flex justify-between items-center">
                <span>Welcome to LSPD</span>
                <span>[X]</span>
            </div>
            <div class="p-8 flex gap-5">
                <div class="w-12 h-12">
                    <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                        <path d="M50 5 L85 20 L85 55 C85 75 50 95 50 95 C50 95 15 75 15 55 L15 20 Z" fill="#ffd700" stroke="#b8860b" stroke-width="2"/>
                        <circle cx="50" cy="50" r="25" fill="#000080"/>
                        <text x="50" y="55" font-size="12" font-weight="900" fill="white" text-anchor="middle" font-family="Arial">LSPD</text>
                        <path d="M40 35 L60 35 M40 65 L60 65" stroke="#ffd700" stroke-width="2"/>
                    </svg>
                </div>
                <div class="flex-1 flex flex-col gap-3">
                    <p class="text-[0.75rem] text-black mb-1">Type a user name and password to log on to the LSPD Database.</p>
                    <div class="flex items-center gap-2">
                        <label class="text-[0.7rem] w-20 whitespace-nowrap text-black font-extrabold uppercase">User name:</label>
                        <div id="user-input" class="flex-1 bg-white border-2 border-[#808080] border-r-white border-b-white px-[6px] py-[3px] text-xs text-black min-h-[22px] relative font-sans"></div>
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="text-[0.7rem] w-20 whitespace-nowrap text-black font-extrabold uppercase">Password:</label>
                        <div id="pass-input" class="flex-1 bg-white border-2 border-[#808080] border-r-white border-b-white px-[6px] py-[3px] text-xs text-black min-h-[22px] relative font-sans"></div>
                    </div>
                    <button id="login-btn" class="self-end w-20 bg-[#c0c0c0] border-2 border-white border-r-[#808080] border-b-[#808080] text-[0.7rem] font-bold py-1">OK</button>
                </div>
            </div>
        </div>
    </div>

    <aside class="w-80 bg-[#11141c] border-r border-white/5 flex flex-col overflow-hidden">
        <div class="p-8 border-b border-white/5 text-center">
            <svg viewBox="0 0 100 100" class="w-12 mx-auto mb-4">
                <path d="M50 5 L85 20 L85 55 C85 75 50 95 50 95 C50 95 15 75 15 55 L15 20 Z" fill="#ffd700" stroke="#b8860b" stroke-width="2"/>
                <circle cx="50" cy="50" r="25" fill="#000080"/>
                <text x="50" y="55" font-size="12" font-weight="900" fill="white" text-anchor="middle" font-family="Arial">LSPD</text>
                <path d="M40 35 L60 35 M40 65 L60 65" stroke="#ffd700" stroke-width="2"/>
            </svg>
            <h1 class="text-sm font-bold text-accent tracking-widest uppercase">LSPD Kartoteka</h1>
        </div>
        
        <div id="chapter-list" class="flex-1 overflow-y-auto p-4 space-y-1"></div>
        
        <div class="p-5 bg-white/[0.02] border-t border-white/5">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[0.65rem] font-bold text-accent tracking-widest uppercase">Overlay Status</span>
                <span id="overlay-badge" class="bg-slate-700 px-2 py-0.5 rounded-full text-[0.6rem] font-bold">OFFLINE</span>
            </div>
            <div class="space-y-1 text-[0.75rem] text-slate-400">
                <div class="flex justify-between"><span>Włącz/Wyłącz:</span><kbd class="bg-slate-800 px-1 rounded text-white font-bold">DEL</kbd></div>
                <div class="flex justify-between"><span>Poprzedni:</span><kbd class="bg-slate-800 px-1 rounded text-white font-bold">PG UP</kbd></div>
                <div class="flex justify-between"><span>Następny:</span><kbd class="bg-slate-800 px-1 rounded text-white font-bold">PG DN</kbd></div>
            </div>
            <div class="mt-4 flex gap-2">
                <button onclick="window.ipc.send('start-overlay')" class="flex-1 bg-success hover:brightness-110 py-1.5 rounded text-[0.6rem] font-bold uppercase transition-all">Start</button>
                <button onclick="window.ipc.send('stop-overlay')" class="flex-1 bg-danger hover:brightness-110 py-1.5 rounded text-[0.6rem] font-bold uppercase transition-all">Stop</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-radial-gradient from-[#131722] to-[#0c0e14]">
        <header class="p-6 px-10 flex justify-center">
            <input type="text" id="search-input" placeholder="Wyszukaj paragraf lub nazwę..." class="w-full max-w-2xl bg-slate-800/50 border border-white/10 rounded-xl px-6 py-4 text-white focus:outline-none focus:ring-2 focus:ring-accent/50 transition-all placeholder:text-slate-500">
        </header>
        
        <section id="articles-view" class="flex-1 overflow-y-auto p-8 pt-0 grid grid-cols-[repeat(auto-fill,minmax(450px,1fr))] gap-5"></section>
    </main>

    <section class="w-120 bg-[#090b0e] border-l border-white/10 flex flex-col p-8 shadow-2xl">
        <h2 class="text-warning font-bold text-lg mb-6 tracking-wide uppercase">Generator Kary</h2>
        <div id="ticket-items" class="flex-1 overflow-y-auto pr-2 space-y-3"></div>
        
        <div class="mt-auto bg-accent p-6 rounded-2xl shadow-lg">
            <div id="total-text" class="text-2xl font-black text-white text-center">0$ / 0msc</div>
            <p class="text-[0.65rem] text-center font-bold text-white/70 uppercase tracking-widest mb-4">Suma bieżąca</p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="generateReport()" class="bg-white hover:bg-slate-100 text-black py-3 rounded-xl font-black text-sm uppercase transition-all">Kopiuj</button>
                <button onclick="clearTicket()" class="bg-black/20 hover:bg-black/30 text-white border border-white/10 py-3 rounded-xl font-bold text-sm uppercase transition-all">Wyczyść</button>
            </div>
        </div>
    </section>

    <img id="fake-cursor" class="fixed w-6 pointer-events-none z-[10000] hidden transition-all duration-500" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white' stroke='black' stroke-width='1'%3E%3Cpath d='M7 2l12 11.2-5.8.8 3.5 6-3 1.7-3.5-6-3.2 4.7z'/%3E%3C/svg%3E">

    <script type="module" src="/src/renderer.js"></script>
</body>
</html>
